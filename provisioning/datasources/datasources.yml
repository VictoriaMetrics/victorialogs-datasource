apiVersion: 1
datasources:
  # <string, required> Name of the VictoriaLogs datasource
  # displayed in Grafana panels and queries.
  - name: VictoriaLogs
    # <string, required> Sets the data source type.
    type: victoriametrics-logs-datasource
    # <string, required> Sets the access mode, either
    # proxy or direct (Server or Browser in the UI).
    access: proxy
    # <string> Sets URL for sending queries to VictoriaLogs server.
    # see https://docs.victoriametrics.com/victorialogs/querying/
    url: http://victorialogs:9428
    jsonData:
      # Default maximum number of log lines returned per query.
      # Defaults to 50, maximum allowed value is 10000.
      #maxLines: 50

      # Multitenancy settings, see https://docs.victoriametrics.com/victorialogs/#multitenancy
      # to use the multitenancy uncomment lines below: AccountID and ProjectID
      multitenancyHeaders:
        #AccountID: 0
        #ProjectID: 0

      # Derived Fields turn a value inside a log message into a clickable link.
      # The example below extracts a `trace_id` and links to a Tempo datasource
      # to open the matching trace. The target can be a tracing datasource
      # (Tempo, Jaeger, Zipkin) or another VictoriaLogs datasource (logs -> logs).
      # `datasourceUid` must match the `uid` of the target datasource.
      #derivedFields:
      #  - name: trace_id
      #    # Take the value from the `trace_id` log field:
      #    matcherType: label
      #    matcherRegex: trace_id
      #    # ...or extract it from the raw log line instead:
      #    # matcherType: regex
      #    # matcherRegex: 'trace_id=(\w+)'
      #    # Value handed to the target datasource. For a tracing datasource this
      #    # is the trace ID; for logs -> logs use a LogsQL query, e.g.
      #    # 'trace_id:${__value.raw}'.
      #    url: '${__value.raw}'
      #    urlDisplayLabel: View trace
      #    datasourceUid: tempo

      # OpenTelemetry preset generates a Derived Field for the trace ID and
      # Log Level Rules for the OTel severity field.
      # NOTE: auto-detection runs only in the datasource settings UI. When
      # provisioning, specify the `detection` block explicitly — without it
      # the preset has no effect.
      #otelPreset:
      #  enabled: true
      #  # <string> `uid` of a Jaeger datasource the generated trace ID derived
      #  # field links to (currently only Jaeger is supported).
      #  # Omit to skip trace linking.
      #  tracesDatasourceUid: jaeger
      #  detection:
      #    # <string> Log field holding the trace ID,
      #    # e.g. trace_id, traceId or TraceId.
      #    traceIdField: trace_id
      #    # Omit `severity` to skip generating log level rules.
      #    severity:
      #      # <string> Log field holding the severity,
      #      # e.g. severity_text or severity_number.
      #      field: severity_text
      #      # <string> `string` for text severities (info, WARN, ...) or
      #      # `number` for numeric OTel severities (1-24).
      #      valueCase: string
      #      # <string> `manual` because the field is set explicitly here
      #      # (`auto` is reserved for UI auto-detection).
      #      source: manual
